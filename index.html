<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konstantin Teplykh – Portfolio</title>
  <meta name="description" content="Personal portfolio of Konstantin Teplykh – Software Engineer, Embedded Systems, AI." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- =========================================================
       HERO
       ========================================================= -->
  <header class="hero">
    <h1 class="hero-name">Konstantin <span>Teplykh</span></h1>
    <p id="hero-title">Software Engineer</p>
    <div class="hero-contact">
      <a href="mailto:konstantin.teplykh@gmail.com">&#9993; konstantin.teplykh@gmail.com</a>
      <span>&#9990; +31 626 934 949</span>
      <span>&#128205; Delft, Netherlands</span>
    </div>
  </header>

  <!-- =========================================================
       ROLE FILTER  (sticky navigation)
       ========================================================= -->
  <div class="role-filter-bar">
    <div id="role-filter"></div>
  </div>

  <!-- =========================================================
       MAIN CONTENT
       ========================================================= -->
  <main>

    <!-- Skills -->
    <section class="section" id="skills">
      <h2 class="section-title">Skills</h2>
      <div id="skills-content"></div>
    </section>

    <!-- Experience -->
    <section class="section" id="experience">
      <h2 class="section-title">Experience</h2>
      <div class="timeline" id="experience-content"></div>
    </section>

    <!-- Achievements -->
    <section class="section" id="achievements">
      <h2 class="section-title">Achievements & Awards</h2>
      <div id="achievements-content"></div>
    </section>

    <!-- Projects -->
    <section class="section" id="projects">
      <h2 class="section-title">Projects</h2>
      <div id="projects-content"></div>
    </section>

    <!-- Education -->
    <section class="section" id="education">
      <h2 class="section-title">Education</h2>
      <div class="timeline" id="education-content"></div>
    </section>

  </main>

  <footer>
    <p>&copy; 2026 Konstantin Teplykh</p>
  </footer>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
      <p id="modal-meta" class="modal-meta"></p>
      <h2 id="modal-title" class="modal-title"></h2>
      <p id="modal-sub" class="modal-sub"></p>
      <ul id="modal-details" class="modal-details"></ul>
    </div>
  </div>

  <!-- Data first, then rendering logic -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
